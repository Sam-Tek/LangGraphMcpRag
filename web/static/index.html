<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangGraph · MCP · RAG</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 16px 24px;
      border-bottom: 1px solid #1e2433;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 1rem; font-weight: 600; color: #a78bfa; }
    header span { font-size: 0.75rem; color: #64748b; }

    #chat {
      flex: 1;
      width: 100%;
      max-width: 760px;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .message {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 90%;
    }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.assistant { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: 14px;
      line-height: 1.6;
      font-size: 0.92rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .user .bubble {
      background: #4f46e5;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .assistant .bubble {
      background: #1e2433;
      color: #e2e8f0;
      border-bottom-left-radius: 4px;
    }

    .label {
      font-size: 0.7rem;
      color: #475569;
      padding: 0 4px;
    }

    .searching {
      font-size: 0.8rem;
      color: #7c3aed;
      font-style: italic;
    }

    #form {
      width: 100%;
      max-width: 760px;
      padding: 16px;
      display: flex;
      gap: 10px;
    }

    #input {
      flex: 1;
      background: #1e2433;
      border: 1px solid #2d3748;
      color: #e2e8f0;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.92rem;
      outline: none;
      resize: none;
      height: 48px;
      transition: border-color 0.2s;
    }

    #input:focus { border-color: #4f46e5; }

    #send {
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0 20px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    #send:hover { background: #4338ca; }
    #send:disabled { background: #334155; cursor: not-allowed; }

    .cursor::after {
      content: "▋";
      animation: blink 0.8s steps(1) infinite;
      color: #7c3aed;
    }

    @keyframes blink { 50% { opacity: 0; } }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <h1>LangGraph · MCP · RAG</h1>
  <span>Llama 3.2 · ChromaDB · FastMCP</span>
</header>

<div id="chat"></div>

<div id="form">
  <textarea id="input" placeholder="Ask a question…" rows="1"></textarea>
  <button id="send">Send</button>
</div>

<script>
  const chat      = document.getElementById('chat');
  const input     = document.getElementById('input');
  const button    = document.getElementById('send');
  const sessionId = crypto.randomUUID();  // unique per browser tab / page load

  function addMessage(role, text) {
    const wrap = document.createElement('div');
    wrap.className = `message ${role}`;

    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = role === 'user' ? 'You' : 'Assistant';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    wrap.appendChild(label);
    wrap.appendChild(bubble);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return bubble;
  }

  async function sendQuestion() {
    const question = input.value.trim();
    if (!question) return;

    input.value = '';
    input.style.height = '48px';
    button.disabled = true;

    addMessage('user', question);

    const bubble = addMessage('assistant', '');
    bubble.classList.add('cursor');
    let buffer = '';

    try {
      const res = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, session_id: sessionId }),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const text = decoder.decode(value);
        const lines = text.split('\n');

        for (const line of lines) {
          if (!line.startsWith('data:')) continue;
          const data = line.replace(/^data:/, '');
          if (data === '[DONE]') break;

          if (data.startsWith('🔍')) {
            const hint = document.createElement('div');
            hint.className = 'searching';
            hint.textContent = data;
            bubble.parentElement.insertBefore(hint, bubble);
          } else {
            buffer += data;
            bubble.textContent = buffer;
            chat.scrollTop = chat.scrollHeight;
          }
        }
      }
    } catch (e) {
      bubble.textContent = 'Error: ' + e.message;
    } finally {
      bubble.classList.remove('cursor');
      button.disabled = false;
      input.focus();
    }
  }

  button.addEventListener('click', sendQuestion);

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendQuestion();
    }
  });

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });
</script>
</body>
</html>
